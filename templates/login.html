<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — FashionMentor AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/themes.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --cream: #f5f0e8;
            --warm-white: #faf8f4;
            --espresso: #2c1a0e;
            --caramel: #c4843b;
            --dust: #b8a99a;
        }
        html, body {
            height: 100%;
            background: var(--cream);
            color: var(--espresso);
            font-family: 'Jost', sans-serif;
            font-weight: 300;
        }
        .wrapper {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        nav {
            padding: 2rem 4rem;
            display: flex;
            justify-content: space-between;
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--espresso);
            text-decoration: none;
        }
        .auth-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: var(--warm-white);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 10px 40px rgba(44,26,14,0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(44,26,14,0.06);
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 2.2rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
        }
        p.subtitle {
            color: var(--dust);
            font-size: 0.85rem;
            margin-bottom: 2rem;
            letter-spacing: 0.05em;
        }
        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.75rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--espresso);
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid rgba(44,26,14,0.15);
            border-radius: 8px;
            background: transparent;
            font-family: 'Jost', sans-serif;
            font-size: 0.9rem;
            color: var(--espresso);
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--caramel);
        }
        button {
            width: 100%;
            padding: 0.9rem;
            background: var(--espresso);
            color: var(--cream);
            border: none;
            border-radius: 8px;
            font-family: 'Jost', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 1rem;
        }
        button:hover { background: var(--caramel); }
        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: var(--dust);
        }
        .auth-links a {
            color: var(--caramel);
            text-decoration: none;
        }
        .error-msg {
            color: #d32f2f;
            font-size: 0.8rem;
            margin-bottom: 1rem;
            background: rgba(211,47,47,0.05);
            padding: 0.5rem;
            border-radius: 4px;
        }
        
        /* Mobile Responsive */
        @media (max-width: 768px) {
            nav { padding: 1.5rem; }
            .auth-card { padding: 2rem 1.5rem; border-radius: 0; border: none; box-shadow: none; background: transparent; }
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <nav>
            <a href="/" class="nav-logo">Deep Style <span>AI</span></a>
        </nav>
        <div class="auth-container">
            <div class="auth-card">
                <h1>Đăng Nhập</h1>
                <p class="subtitle">Truy cập tủ đồ ảo của bạn</p>
                
                {% if error %}
                <div class="error-msg">{{ error }}</div>
                {% endif %}
                
                <form action="/login" method="POST">
                    <div class="form-group">
                        <label for="username">Tên đăng nhập</label>
                        <input type="text" id="username" name="username" required>
                    </div>
                    <div class="form-group">
                        <label for="password">Mật khẩu</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    <button type="submit">Đăng Nhập</button>
                </form>
                
                <div class="auth-links">
                    Chưa có tài khoản? <a href="/register">Đăng ký ngay</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
